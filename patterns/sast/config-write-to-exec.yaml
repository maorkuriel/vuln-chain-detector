id: config-write-to-exec
name: Tainted Config Write to Cross-Session Execution
description: >
  Attacker-controlled data is written to a user config file in one session.
  In a subsequent session, the config is loaded and a hook field is executed
  directly as a shell command without validation. Enables persistent RCE.
cwe: CWE-78
severity: Critical
cvss_base: 9.1

source:
  type: ANY
  note: Any tainted data that reaches a STORE node can bootstrap this chain.

store:
  type: CONFIG_FILE_WRITE
  sensitive_paths:
    - ~/.depguard/config.json
    - ~/.config/**
    - .env
    - package.json
    - "*.config.js"
    - "*.config.ts"
  tainted_fields:
    - preScanHook
    - postScanHook
    - hooks.*
    - scripts.*

load:
  type: CONFIG_FILE_READ
  pattern: JSON.parse(fs.readFileSync(store.path))

sink:
  type: SHELL_EXEC
  pattern: execSync(config.preScanHook)
  note: Hook executes silently before main operation; no output to user.

session_crossing: true
user_interaction_required: false

fix:
  description: Validate hook fields against executable path allowlist before running.
  recommendation: Use execFileSync with args array, never execSync with a shell string.
