id: credential-exfil-chain
name: Full RCE to Credential Exfiltration Chain
description: >
  A complete 3-stage chain: (1) env var injection gains initial execution,
  (2) payload writes a malicious config file for persistence,
  (3) the config is loaded next session and executes a credential exfiltration
  command silently before the main operation begins.
cwe: CWE-78
severity: Critical
cvss_base: 10.0
chain_with:
  - env-injection-to-shell
  - config-write-to-exec

stages:
  - id: stage_1
    name: Initial Foothold
    pattern: env-injection-to-shell
    outcome: arbitrary command execution in target process

  - id: stage_2
    name: Persistence Setup
    type: STORE
    action: Stage 1 payload writes malicious preScanHook to tool config file
    outcome: malicious config persists across sessions

  - id: stage_3
    name: Credential Exfiltration
    pattern: config-write-to-exec
    outcome: on next session start, preScanHook exfiltrates credentials silently

session_crossing: true
user_interaction_required: false
ci_cd_multiplier: true

exfiltration_targets:
  - ~/.aws/credentials
  - ~/.aws/config
  - ~/.ssh/id_rsa
  - ~/.ssh/id_ed25519
  - process.env

fix:
  description: Defense-in-depth — fix all three stages independently.
  fixes:
    - stage: 1
      action: Strip shell metacharacters from env vars; use arg arrays not shell strings
    - stage: 3
      action: Validate hook fields against executable path allowlist; fail closed if invalid
    - general:
      action: Default to shell-false execution. Treat config files as untrusted at startup.
